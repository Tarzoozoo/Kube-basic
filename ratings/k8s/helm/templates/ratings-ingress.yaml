apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  {{- if .Values.ingress.annotations }}
  annotations:
  {{- range $key, $value := .Values.ingress.annotations }} # FOR loop in annotaion --> มี key, value มารับ
    {{ $key }}: {{ $value | quote }}                        # | helper fuction; ใส่ ''
  {{- end }}
  {{- end }}
  name: {{ .Release.Name }}
  namespace: {{ .Values.ratings.namespace }}
spec:

  # ถ้า Domain ที่เข้ามา = host และใช้ HTTP protocol
  # และมี Path = /ratings/... ถ้าตรงตาม Rules
  # จะเข้าสู่ Backend -> Service
  rules:
    - host: {{ .Values.ingress.host }} # ขึ้นอยู่กับ domain ที่เราใช้งาน
    # - host: xxx.xxx.xxx.xxx.nip.io # nip.io reslove IP to Domain
      http:
        paths:
          - path: /ratings(/|$)(.*) 
            # Regular expression
            # http://bookinfo.dev.opsta.net/ratings/star/2
            # (/)(star/2) --> rewrite target according above
            pathType: Prefix        # If prefix by /ratings
            backend:
              service:
                name: {{ .Release.Name }} # must match with service.metadata.name
                port:
                  number: {{ .Values.ratings.port }}
