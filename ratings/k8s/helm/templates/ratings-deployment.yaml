apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.ratings.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ratings.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}

          # You have to change it according to your private registry
          image: {{ .Values.ratings.image }}:{{ .Values.ratings.tag }}
          imagePullPolicy: Always # Policy that confirm to use lastest image
          ports:
            - containerPort: {{ .Values.ratings.port }}
              name: web-port
              protocol: TCP
          livenessProbe: # ยิง GET เพื่อเช็ค2 ถ้า failed -> restart pod
            httpGet:
              path: {{ .Values.ratings.healthCheckPath }}
              port: {{ .Values.ratings.port }}
              scheme: HTTP
          readinessProbe: # ยิง GET เพื่อเช็ค1 1 ครั้ง
            httpGet:
              path: {{ .Values.ratings.healthCheckPath }}
              port: {{ .Values.ratings.port }}
              scheme: HTTP
          {{- if .Values.extraEnv }}
          env:
          {{- range $key, $value := .Values.extraEnv }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          {{- if .Values.ratings.mongodbPasswordExistingSecret }}
          - name: MONGO_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.ratings.mongodbPasswordExistingSecret }}
                key: mongodb-password
          {{- end }}
          {{- end }}
      imagePullSecrets:
        - name: {{ .Values.ratings.imagePullSecrets }} # Secret name to use for authentication when pulling image
